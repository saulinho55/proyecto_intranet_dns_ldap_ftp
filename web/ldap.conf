<IfModule mod_ldap.c>
    LDAPLog /var/log/proftpd/ldap.log
    LDAPServer ldap://192.168.1.45:389/??sub
    LDAPBindDN "cn=admin,dc=centro,dc=local" "1234"
    LDAPUsers ou=usuarios,dc=centro,dc=local "(uid=%u)"

    LDAPAttr uid uid
    LDAPAttr uidNumber uidNumber
    LDAPAttr gidNumber gidNumber
    LDAPAttr homeDirectory homeDirectory

    LDAPGroups ou=grupos,dc=centro,dc=local

    LDAPAuthBinds on
    LDAPGenerateHomedir on
</IfModule>

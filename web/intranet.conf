<VirtualHost *:80>
    ServerName intranet.centro.local
    DocumentRoot /var/www/intranet

    <Directory /var/www/intranet/public>
        Require all granted
    </Directory>

    <Directory /var/www/intranet/profesores>
        AuthType Basic
        AuthName "Introduzca el usuario y contrasena"
        AuthBasicProvider ldap
        AuthLDAPURL "ldap://192.168.1.45/ou=usuarios,dc=centro,dc=local?uid?sub?(objectClass=*)"
        AuthLDAPBindDN "cn=admin,dc=centro,dc=local"
        AuthLDAPBindPassword 1234
        Require ldap-group cn=profesores,ou=grupos,dc=centro,dc=local
    </Directory>

    <Directory /var/www/intranet/alumnos>
        AuthType Basic
        AuthName "Introduzca el usuario y contrasena"
        AuthBasicProvider ldap
        AuthLDAPURL "ldap://192.168.1.45/ou=usuarios,dc=centro,dc=local?uid?sub?(objectClass=*)"
        AuthLDAPBindDN "cn=admin,dc=centro,dc=local"
        AuthLDAPBindPassword 1234
        Require ldap-group cn=alumnos,ou=grupos,dc=centro,dc=local
    </Directory>
</VirtualHost>
